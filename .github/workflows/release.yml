name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build universal binary
        run: make release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: KeepGoing-macos.zip
          generate_release_notes: true
